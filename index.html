<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceFlow</title>

<style>
:root {
  --bg:#0b0f1a;
  --surface:#111827;
  --surface2:#1a2235;
  --border:rgba(255,255,255,0.07);
  --accent:#00e5a0;
  --text:#f0f4f8;
  --text2:#8a9ab5;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  border-bottom:1px solid var(--border);
}

nav button {
  background:none;
  border:none;
  color:var(--text2);
  margin:0 5px;
  cursor:pointer;
}

nav button.active {
  color:var(--accent);
}

main { padding:20px; }

.page { display:none; }
.page.active { display:block; }

.card {
  background:var(--surface);
  padding:20px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* tabela */
.tabela-mensal {
  width:100%;
  border-collapse:collapse;
}

.tabela-mensal th,
.tabela-mensal td {
  padding:10px;
  border-bottom:1px solid var(--border);
}

.tabela-mensal th {
  color:var(--text2);
  text-align:left;
}

.tabela-mensal tr:hover {
  background:var(--surface2);
}

input, select {
  padding:8px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:white;
}
</style>
</head>

<body>

<header>
  <div>FinanceFlow</div>
  <nav>
    <button class="active" onclick="showPage('cartoes')">Cartões</button>
    <button onclick="showPage('mensal')">Mensal</button>
  </nav>
</header>

<main>

<!-- CARTÕES -->
<div class="page active" id="page-cartoes">

  <div class="card">
    <h3>Novo Cartão</h3>
    <input id="nome-cartao" placeholder="Nome">
    <input id="limite-cartao" type="number" placeholder="Limite">
    <button onclick="addCartao()">Adicionar</button>
  </div>

  <div class="card" style="margin-top:20px">
    <h3>Cartões</h3>
    <div id="lista-cartoes"></div>
  </div>

  <div class="card" style="margin-top:20px">
    <h3>Despesas</h3>
    <input id="desc" placeholder="Descrição">
    <input id="valor" type="number" placeholder="Valor">
    <select id="parcelas">
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="3">3x</option>
      <option value="6">6x</option>
      <option value="12">12x</option>
    </select>
    <button onclick="addDespesa()">Adicionar</button>
  </div>

</div>

<!-- MENSAL -->
<div class="page" id="page-mensal">

  <div style="margin-bottom:15px">
    <input type="month" id="mes-input" onchange="changeMes(this.value)">
  </div>

  <div class="card">
    <table class="tabela-mensal">
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Cartão</th>
          <th>Parcela</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="mensal-body"></tbody>
    </table>
  </div>

</div>

</main>

<script>

let state = {
  cartoes: [],
  selectedCartaoId: null,
  mesAtual: new Date().toISOString().slice(0,7)
};

function save(){
  localStorage.setItem('ff', JSON.stringify(state));
}

function load(){
  const s = localStorage.getItem('ff');
  if(s) state = JSON.parse(s);
}

load();

/* NAV */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));

  document.getElementById('page-'+id).classList.add('active');
  event.target.classList.add('active');

  if(id==='mensal'){
    document.getElementById('mes-input').value = state.mesAtual;
    renderMensal();
  }
}

/* FORMAT */
function fmt(v){
  return 'R$ ' + v.toFixed(2);
}

/* CARTAO */
function addCartao(){
  const nome = document.getElementById('nome-cartao').value;
  const limite = parseFloat(document.getElementById('limite-cartao').value);

  if(!nome || !limite) return;

  state.cartoes.push({
    id:Date.now(),
    nome,
    limite,
    despesas:[]
  });

  save();
  renderCartoes();
}

function renderCartoes(){
  const el = document.getElementById('lista-cartoes');

  el.innerHTML = state.cartoes.map(c=>`
    <div onclick="selectCartao(${c.id})" style="cursor:pointer;padding:5px">
      ${c.nome} (Limite: ${fmt(c.limite)})
    </div>
  `).join('');
}

function selectCartao(id){
  state.selectedCartaoId = id;
}

/* DESPESA */
function addDespesa(){
  const c = state.cartoes.find(x=>x.id===state.selectedCartaoId);
  if(!c) return alert('Selecione um cartão');

  const desc = document.getElementById('desc').value;
  const valor = parseFloat(document.getElementById('valor').value);
  const parcelas = parseInt(document.getElementById('parcelas').value);

  c.despesas.push({
    id:Date.now(),
    desc,
    valor,
    parcelas,
    data:new Date().toISOString()
  });

  save();
}

/* MENSAL */
function changeMes(v){
  state.mesAtual = v;
  save();
  renderMensal();
}

function renderMensal(){
  const tbody = document.getElementById('mensal-body');
  let total = 0;
  let linhas = [];

  state.cartoes.forEach(c=>{
    c.despesas.forEach(d=>{
      const inicio = new Date(d.data);

      for(let i=0;i<d.parcelas;i++){
        const data = new Date(inicio);
        data.setMonth(data.getMonth()+i);

        const mes = data.toISOString().slice(0,7);

        if(mes===state.mesAtual){
          const v = d.valor/d.parcelas;
          total += v;

          linhas.push(`
            <tr>
              <td>${d.desc}</td>
              <td>${c.nome}</td>
              <td>${i+1}/${d.parcelas}</td>
              <td>${fmt(v)}</td>
            </tr>
          `);
        }
      }
    });
  });

  linhas.push(`
    <tr style="font-weight:bold">
      <td colspan="3">TOTAL</td>
      <td>${fmt(total)}</td>
    </tr>
  `);

  tbody.innerHTML = linhas.join('');
}

/* INIT */
renderCartoes();

</script>

</body>
</html>
